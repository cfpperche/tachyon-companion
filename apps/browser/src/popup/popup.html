<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tachyon Companion</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Tachyon Companion</h1>
      <p class="sub">Pair with a local Tachyon engine</p>
    </header>

    <section class="card">
      <div id="badge" class="badge" data-status="disconnected">
        <span class="dot" aria-hidden="true"></span>
        <span id="status">disconnected</span>
      </div>
      <dl class="meta">
        <div>
          <dt>Engine</dt>
          <dd id="engine">—</dd>
        </div>
        <div>
          <dt>Base URL</dt>
          <dd id="baseUrl">—</dd>
        </div>
        <div>
          <dt>Protocol</dt>
          <dd id="protocol">—</dd>
        </div>
        <div>
          <dt>Extension</dt>
          <dd id="version">—</dd>
        </div>
      </dl>
      <p id="error" class="error" hidden></p>
    </section>

    <section class="card" id="pair-form">
      <h2>Pair</h2>
      <label>
        Base URL
        <input id="inputBase" type="url" placeholder="http://127.0.0.1:41xxx" autocomplete="off" />
      </label>
      <label>
        Pair code
        <input id="inputCode" type="text" placeholder="XXXXXXXX" maxlength="16" autocomplete="off" spellcheck="false" />
      </label>
      <p class="hint">
        In VS Code: command <strong>Tachyon: Pair Companion (show code)</strong> — pastes
        <code>code=… baseUrl=…</code> to the clipboard.
      </p>
      <button type="button" id="pair">Pair</button>
    </section>

    <footer class="actions">
      <button type="button" id="refresh">Refresh</button>
      <button type="button" id="reset" class="ghost">Unpair</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
