<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tachyon Companion</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Tachyon Companion</h1>
      <p class="sub">Pair · message active agents</p>
    </header>

    <section class="card">
      <div id="badge" class="badge" data-status="disconnected">
        <span class="dot" aria-hidden="true"></span>
        <span id="status">disconnected</span>
      </div>
      <dl class="meta">
        <div>
          <dt>Engine</dt>
          <dd id="engine">—</dd>
        </div>
        <div>
          <dt>Base URL</dt>
          <dd id="baseUrl">—</dd>
        </div>
        <div>
          <dt>Protocol</dt>
          <dd id="protocol">—</dd>
        </div>
        <div>
          <dt>Extension</dt>
          <dd id="version">—</dd>
        </div>
      </dl>
      <p id="error" class="error" hidden></p>
      <p id="info" class="info" hidden></p>
    </section>

    <section class="card" id="pair-form">
      <h2>Pair</h2>
      <label>
        Base URL
        <input id="inputBase" type="url" placeholder="http://127.0.0.1:41xxx" autocomplete="off" />
      </label>
      <label>
        Pair code
        <input id="inputCode" type="text" placeholder="XXXXXXXX" maxlength="16" autocomplete="off" spellcheck="false" />
      </label>
      <p class="hint">
        VS Code: <strong>Tachyon: Pair Companion (show code)</strong>
      </p>
      <button type="button" id="pair">Pair</button>
    </section>

    <section class="card" id="prompt-form" hidden>
      <h2>Message agent</h2>
      <label>
        Active agent
        <select id="agentSelect">
          <option value="">— refresh —</option>
        </select>
      </label>
      <label>
        Message
        <textarea id="promptText" rows="3" maxlength="2000" placeholder="What should the agent do?"></textarea>
      </label>
      <p class="hint">If the agent is working, Tachyon queues until idle.</p>
      <div class="row">
        <button type="button" id="refreshAgents" class="ghost">Refresh list</button>
        <button type="button" id="sendPrompt">Send</button>
      </div>
    </section>

    <footer class="actions">
      <button type="button" id="refresh">Refresh</button>
      <button type="button" id="reset" class="ghost">Unpair</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
